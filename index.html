<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super AI Orchestrator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Super AI <span class="badge">Multi-Agent</span></h1>
        </header>
        
        <div class="chat-box" id="chatDisplay">
            <div class="bot-msg">Sistem siap. Silahkan lampirkan file atau ketik instruksi.</div>
        </div>

        <div class="input-area">
            <div class="preview-files" id="filePreview"></div>
            <div class="input-wrapper">
                <label for="fileInput" class="icon-btn">
                    <i class="fas fa-plus"></i>
                </label>
                <input type="file" id="fileInput" multiple accept="image/*,.pdf" style="display:none">
                
                <textarea id="mainPrompt" placeholder="Tanya sesuatu atau minta analisis data..."></textarea>
                
                <button id="btnSend" onclick="mulaiProses()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div class="process-monitor" id="monitor">
            <small>Logika Orkestrasi:</small>
            <div id="stepInfo">Standby</div>
            <div class="progress-bar"><div id="progressFill"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
